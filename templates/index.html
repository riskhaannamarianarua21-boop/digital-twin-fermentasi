<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Digital Twin Fermentasi</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:'Segoe UI'; display:flex; background:#eef2f7; }

.sidebar {
    width:220px;
    background:#1e293b;
    color:white;
    padding:20px;
}
.sidebar p { cursor:pointer; padding:10px; border-radius:8px; }
.sidebar p:hover { background:#334155; }

.main { flex:1; display:flex; }
.section { display:none; width:100%; }
.active { display:flex; }

.tank-area { flex:2; display:flex; justify-content:center; align-items:center; }

.tank {
    width:220px; height:320px;
    border-radius:20px;
    border:5px solid #334155;
    position:relative;
    overflow:hidden;
    background:#e2e8f0;
}

.liquid {
    position:absolute;
    bottom:0;
    width:100%;
    background: linear-gradient(#a16207, #78350f);
}

.liquid::before {
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    top:-150%;
    left:-50%;
    background:rgba(255,255,255,0.2);
    border-radius:40%;
    animation:wave 5s linear infinite;
}

@keyframes wave {
    0% {transform:rotate(0deg);} 
    100% {transform:rotate(360deg);} 
}

.temp-label {
    position:absolute;
    top:10px;
    left:10px;
    background:black;
    color:white;
    padding:4px;
    border-radius:5px;
}

.panel { flex:1; padding:20px; }

.card {
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}

button {
    width:100%;
    padding:10px;
    margin-top:5px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:8px;
}

.green {color:green;}
.orange {color:orange;}
.red {color:red;}

.alarm {
    animation:blink 0.6s infinite;
}

@keyframes blink {
    0% {background:red;color:white;}
    50% {background:transparent;color:red;}
    100% {background:red;color:white;}
}

table { width:100%; border-collapse:collapse; }
th,td { border:1px solid #ccc; padding:6px; text-align:center; }

.note {
    font-size:13px;
    color:#555;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h3>Digital Twin</h3>
    <p onclick="showPage('dashboard')">Dashboard</p>
    <p onclick="showPage('simulasi')">Simulasi</p>
    <p onclick="showPage('data')">Data</p>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
    <div class="tank-area">
        <div class="tank">
            <div id="tempLabel" class="temp-label">--°C</div>
            <div id="liquid" class="liquid"></div>
        </div>
    </div>

    <div class="panel">
        <div class="card">
            <h3>Status</h3>
            <p id="status">-</p>
        </div>
        <div class="card">
            <h3>Fase</h3>
            <p id="fase">-</p>
        </div>
    </div>
</div>

<!-- SIMULASI -->
<div id="simulasi" class="section">
    <div class="tank-area">
        <div class="tank">
            <div id="tempLabel2" class="temp-label">--°C</div>
            <div id="liquid2" class="liquid"></div>
        </div>
    </div>

    <div class="panel">

        <div class="card">
            <form id="form">

                <!-- PERUBAHAN UTAMA DI SINI -->
                <input type="number" 
                       name="suhu" 
                       placeholder="Kosongkan untuk sensor otomatis">

                <input type="number" 
                       name="waktu" 
                       value="120" 
                       required>

                <button type="submit">
                    Simulasi
                </button>

                <p class="note">
                   
                </p>

            </form>

            <button onclick="startRealtime()">
                Realtime
            </button>

            <button onclick="compare()">
                Bandingkan (opsional)
            </button>
        </div>

        <div class="card">
            <canvas id="grafik"></canvas>
        </div>

    </div>
</div>

<!-- DATA -->
<div id="data" class="section">
    <div class="panel" style="width:100%">
        <div class="card">
            <table id="tableData">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Metode 1</th>
                        <th>Metode 2</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

</div>

<script>

let chart, interval;

function showPage(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

document.getElementById("form").onsubmit = async(e)=>{
    e.preventDefault();
    clearInterval(interval);

    const res = await fetch("/compare",{
        method:"POST",
        body:new FormData(e.target)
    });

    const data = await res.json();

    let m1 = data.metode1;
    let m2 = data.metode2;

    updateUI(m1[m1.length-1]);
    updateChart(m1, m2);
    updateTable(m1, m2);
};

async function startRealtime(){
    clearInterval(interval);

    const res = await fetch("/realtime");
    const data = await res.json();

    let i=0;

    chart = new Chart(document.getElementById("grafik"),{
        type:"line",
        data:{labels:[],datasets:[{label:"Realtime",data:[]}]}
    });

    interval = setInterval(()=>{
        if(i>=data.length){clearInterval(interval);return;}
        let p=data[i];

        chart.data.labels.push(p.waktu);
        chart.data.datasets[0].data.push(p.suhu);
        chart.update();

        updateUI(p);
        i++;
    },500);
}

async function compare(){
    document.getElementById("form").dispatchEvent(new Event("submit"));
}

function updateUI(d){

    document.getElementById("tempLabel").innerText=d.suhu+"°C";
    document.getElementById("liquid").style.height=(d.suhu*2)+"%";

    document.getElementById("tempLabel2").innerText=d.suhu+"°C";
    document.getElementById("liquid2").style.height=(d.suhu*2)+"%";

    let s=document.getElementById("status");
    s.className="";

    if(d.suhu>=28&&d.suhu<=32){
        s.innerText="OPTIMAL";
        s.classList.add("green");
    }
    else if(d.suhu<28){
        s.innerText="DINGIN";
        s.classList.add("orange","alarm");
    }
    else{
        s.innerText="PANAS";
        s.classList.add("red","alarm");
    }

    let f=document.getElementById("fase");
    if(d.waktu<24) f.innerText="Awal";
    else if(d.waktu<72) f.innerText="Aktif";
    else f.innerText="Selesai";
}

function updateChart(m1, m2){
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("grafik"),{
        type:"line",
        data:{
            labels:m1.map(x=>x.waktu),
            datasets:[
                {label:"Metode 1", data:m1.map(x=>x.suhu)},
                {label:"Metode 2", data:m2.map(x=>x.suhu)}
            ]
        }
    });
}

function updateTable(m1, m2){
    let tbody=document.querySelector("#tableData tbody");
    tbody.innerHTML="";

    for(let i=0;i<m1.length;i++){
        tbody.innerHTML+=`
        <tr>
            <td>${m1[i].waktu}</td>
            <td>${m1[i].suhu}</td>
            <td>${m2[i].suhu}</td>
        </tr>`;
    }
}

</script>

</body>
</html>
